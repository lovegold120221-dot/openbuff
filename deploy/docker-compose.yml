services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        FREEBUFF_TOKEN: ${FREEBUFF_TOKEN:?Set FREEBUFF_TOKEN in .env}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - FREEBUFF_HOST=0.0.0.0
      - FREEBUFF_PORT=8000
      - FREEBUFF_TOKEN=${FREEBUFF_TOKEN}
      - FREEBUFF_API_KEY=${API_KEY:-}
      - FREEBUFF_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
